<!DOCTYPE html>
<html>
    <head>
        <title>설문지</title>
        <meta charset="utf-8">
    </head>
    <body>
        <h3>설문지</h3>
        <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
        <hr>
        <form>
            <label>
                학년<input type="radio" name="grade" value="1">1학년
                <input type="radio" name="grade" value="2">2학년
                <input type="radio" name="grade" value="3">3학년
            </label><br>
            <label>
                성별<input type="radio" name="gender" value="1">남
                <input type="radio" name="gender" value="2">여
            </label><br>
            <label>
                관심 분야<select name="interests">
                    <option value="1">모바일 소프트웨어</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </label><br>
            <label>
                진로<input type="checkbox" name="ex" value="1">개발
                <input type="checkbox" name="ex" value="2">기획
                <input type="checkbox" name="ex" value="3">영업
                <input type="checkbox" name="ex" value="4">창업
            </label><br>
            <label>
                남기고 싶은 말
                <input type="text" size="10" rows="3" placeholder="글을 남겨주세요">
            </label>
        </form>
        <footer>Copyright 2026 by MYONGJI COLLEGE</footer>
    </body>
</html>
