<!DOCTYPE html>
<html>
    <head>
        <title>설문지</title>
        <meta charset="utf-8">
    </head>
    <body>
        <h3>설문지</h3>
        <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
        <hr>
        <form>
            학년
            <label>
                <input type="radio" name="grade" value="1" checked>1학년
            </label>
            <label>
                <input type="radio" name="grade" value="2">2학년
            </label>
            <label>
                <input type="radio" name="grade" value="3">3학년
            </label><br>
            성별
            <label>
                <input type="radio" name="gender" value="1">남
            </label>
            <label>
                <input type="radio" name="gender" value="2">여
            </label><br>
            <label>
                관심 분야<select name="interests">
                    <option value="1">정보 보안</option>
                    <option value="2">시스템 소프트웨어</option>
                    <option value="3">응용 소프트웨어</option>
                    <option value="4">임베디드 소프트웨어</option>
                </select>
            </label><br>
            진로
            <label>
                <input type="checkbox" name="ex" value="1" checked>개발
            </label>
            <label>
                <input type="checkbox" name="ex" value="2">기획
            </label>
            <label>
                <input type="checkbox" name="ex" value="3">영업
            </label>
            <label>
                <input type="checkbox" name="ex" value="4">창업
            </label><br>
            <label>
                남기고 싶은 말
                <textarea name="comment" rows="10" cols="40" placeholder="글을 남겨주세요"></textarea>
            </label>
        </form>
        <footer>Copyright 2026 by MYONGJI COLLEGE</footer>
    </body>
</html>
