<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>색 테이블 만들기</title>
        <style>
            h3{text-shadow: 3px 3px  rgb(178, 214, 255);}
            table {border: 1px;}
            #brown {width: 50px; height: 25px; background-color: brown;}
            #deepskyblue {width: 50px; height: 25px; background-color: deepskyblue;}
            #Blueviolet {width: 50px; height: 25px; background-color: blueviolet;}
            #Gold {width: 50px; height: 25px; background-color: gold;}
            #DarkOrange {width: 50px; height: 25px; background-color: darkorange;}
            #OliveDrab {width: 50px; height: 25px; background-color: olivedrab;}
        </style>
    </head>
    <body>
        <h3>색 이름과 코드</h3>
        <hr>
        <table border="1">
            <thead>
                <tr><th>이름</th><th>코드</th><th>색</th><th>이름</th><th>코드</th><th>색</th></tr>
            </thead>
            <tbody>
                <tr><td>Brown</td><td>#A52A2A</td><td><div id="brown">&emsp;</div></td><td>DeepSkyBlue</td><td>#00BFFF</td><td><div id="deepskyblue"></div></td></tr>
                <tr><td>Blueviolet</td><td>#8A2BE2</td><td><div id="Blueviolet">&emsp;</div></td><td>Gold</td><td>#FFD700</td><td><div id="Gold">&emsp;</div></td></tr>
                <tr><td>DarkOrange</td><td>#FF8C00</td><td><div id="DarkOrange">&emsp;</div></td><td>OliveDrab</td><td>#6B8E23</td><td><div id="OliveDrab">&emsp;</div></td></tr>
            </tbody>
        </table>
    </body>
</html>
